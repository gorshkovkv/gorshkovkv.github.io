<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUMI Tools</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #111; color: #eee;
         padding: 12px; max-width: 480px; margin: 0 auto; }
  h1   { font-size: 1.1rem; color: #7dd; margin-bottom: 12px; }
  .card { background: #1a1a1a; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .card h2 { font-size: 0.72rem; color: #555; text-transform: uppercase;
             letter-spacing: 1px; margin-bottom: 10px; }
  input[type=text] { width: 100%; background: #252525; border: 1px solid #444;
                     border-radius: 8px; padding: 8px 12px; color: #eee;
                     font-size: 0.95rem; margin-bottom: 6px; }
  .btn { display: block; width: 100%; padding: 11px; border-radius: 10px; border: none;
         font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-bottom: 7px; color: #fff; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn-file   { background: #252525; color: #777; text-align: left; font-weight: 400; }
  .btn-file.ok { color: #7dd; }
  .btn-purple { background: #4a2060; }
  .btn-green  { background: #1a5c3a; }
  .btn-blue   { background: #1a3a6e; }
  .btn-red    { background: #5a1e1e; }
  .btn-send   { background: #1e4a8a; }
  .pw { background: #252525; border-radius: 6px; height: 6px; overflow: hidden; margin: 4px 0; }
  .pb { height: 100%; background: #7dd; width: 0%; transition: width 0.1s; }
  .pl { font-size: 0.7rem; color: #555; text-align: right; margin-bottom: 2px; }
  .log { font-family: 'Menlo', monospace; font-size: 0.68rem; background: #080808;
         border-radius: 8px; padding: 8px; max-height: 160px; overflow-y: auto; color: #8e8; }
  .log .e { color: #f77; } .log .w { color: #fa4; }
  .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
         background: #444; margin-right: 6px; vertical-align: middle; }
  .dot.on { background: #2f2; } .dot.er { background: #f44; }
  #preview { max-width: 100%; border-radius: 6px; display: none; margin: 8px 0;
             image-rendering: pixelated; }
  input[type=file] { display: none; }
  .lbl { font-size: 0.72rem; color: #555; display: block; margin-bottom: 4px; }
  .meta-box { background: #252525; border-radius: 8px; padding: 10px;
              margin-bottom: 8px; font-size: 0.78rem; line-height: 1.6; }
  .meta-box span { color: #7dd; }
  .fname-box { background: #1a2a1a; border: 1px solid #2a4a2a; border-radius: 8px;
               padding: 8px 10px; margin-bottom: 8px; font-size: 0.72rem;
               font-family: 'Menlo', monospace; color: #9d9; word-break: break-all; }
</style>
</head>
<body>
<h1>🐙 SUMI Tools</h1>

<div class="card">
  <h2>1 · Конвертер EPUB</h2>
  <button class="btn btn-file" id="bfc" onclick="$('fileConv').click()">📁 Выбрать EPUB...</button>
  <input type="file" id="fileConv" accept=".epub">
  <div id="metaBox" style="display:none" class="meta-box"></div>
  <div id="fnameBox" style="display:none" class="fname-box"></div>
  <button class="btn btn-purple" id="bConv" disabled>⚙️ Конвертировать изображения</button>
  <div class="pw"><div class="pb" id="cp"></div></div>
  <div class="pl" id="cl"></div>
  <canvas id="preview"></canvas>
  <button class="btn btn-green" id="bDl" disabled>💾 Скачать обработанный EPUB</button>
</div>

<div class="card">
  <h2>2 · Bluetooth</h2>
  <span class="dot" id="dot"></span><span id="bst">Не подключено</span>
  <div style="height:10px"></div>
  <button class="btn btn-blue" id="bConn">🔵 Подключить SUMI</button>
  <button class="btn btn-red"  id="bDisc" disabled>✖ Отключить</button>
</div>

<div class="card">
  <h2>3 · Отправить на устройство</h2>
  <span class="lbl">Папка на устройстве</span>
  <input type="text" id="folder" value="books">
  <button class="btn btn-send" id="bSendConv" disabled>🚀 Отправить сконвертированный EPUB</button>
  <div style="margin: 6px 0; font-size: 0.7rem; color: #444; text-align:center">— или выбрать готовый файл —</div>
  <button class="btn btn-file" id="bfs" onclick="$('fileSend').click()">📁 Выбрать файл...</button>
  <input type="file" id="fileSend">
  <button class="btn btn-send" id="bSendFile" disabled>🚀 Отправить файл</button>
  <div class="pw"><div class="pb" id="sp"></div></div>
  <div class="pl" id="sl"></div>
</div>

<div class="card"><div class="log" id="log"></div></div>

<script>
const $ = id => document.getElementById(id);
const enc = new TextEncoder(), dec = new TextDecoder();
const sleep = ms => new Promise(r => setTimeout(r, ms));

function log(msg, cls) {
  const el = $('log'), d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}

// ── EPUB METADATA ─────────────────────────────────────────────────────────
function parseEpubMeta(opf) {
  // Title
  const titleM = opf.match(/<dc:title[^>]*>([^<]+)<\/dc:title>/i);
  const title = titleM ? titleM[1].trim() : '';

  // Author: prefer opf:file-as="Last, First", fallback to dc:creator text
  let author = '';
  const creatorTag = opf.match(/<dc:creator([^>]*)>([^<]+)<\/dc:creator>/i);
  if (creatorTag) {
    const attrs = creatorTag[1];
    const fileAs = attrs.match(/(?:opf:file-as|file-as)="([^"]+)"/i);
    if (fileAs) {
      // "Лукьяненко, Сергей" → "Лукьяненко Сергей"
      author = fileAs[1].replace(',', '').replace(/\s+/, ' ').trim();
    } else {
      // "Сергей Лукьяненко" → "Лукьяненко Сергей" (reverse words)
      const parts = creatorTag[2].trim().split(/\s+/);
      author = parts.length >= 2 ? parts.slice(1).join(' ') + ' ' + parts[0] : parts[0];
    }
  }

  // Series — Calibre style (most common in RU-books)
  const seriesM   = opf.match(/<meta\s[^>]*name="calibre:series"\s[^>]*content="([^"]+)"/i)
                 || opf.match(/<meta\s[^>]*content="([^"]+)"\s[^>]*name="calibre:series"/i);
  const seriesIdxM = opf.match(/<meta\s[^>]*name="calibre:series_index"\s[^>]*content="([^"]+)"/i)
                  || opf.match(/<meta\s[^>]*content="([^"]+)"\s[^>]*name="calibre:series_index"/i);

  // EPUB3 collection fallback
  const collM = !seriesM && opf.match(/<meta\s[^>]*property="belongs-to-collection"[^>]*>([^<]+)<\/meta>/i);

  const series    = seriesM    ? seriesM[1].trim()    : (collM ? collM[1].trim() : '');
  const seriesIdx = seriesIdxM ? seriesIdxM[1].trim() : '';

  return { title, author, series, seriesIdx };
}

function formatSeriesIdx(raw) {
  if (!raw) return '';
  const n = parseFloat(raw);
  if (isNaN(n)) return raw;
  // 1.0 → "1", 1.5 → "1.5"
  return n % 1 === 0 ? String(Math.round(n)) : String(n);
}

function buildFilename(meta) {
  const { title, author, series, seriesIdx } = meta;
  const t = title  || 'Unknown';
  const a = author || 'Unknown';

  let seriesPart = '';
  if (series) {
    const idx = formatSeriesIdx(seriesIdx);
    seriesPart = idx ? ' - [' + series + ' #' + idx + ']' : ' - [' + series + ']';
  }

  // Автор - [Серия #N] - Название.epub
  return sanitizeFilename(a + seriesPart + ' - ' + t + '.epub');
}

function sanitizeFilename(name) {
  return name.replace(/[\\/*?:"<>|]/g, '_').replace(/\s+/g, ' ').trim();
}

// ── DITHERER ──────────────────────────────────────────────────────────────
const THRESH   = [30, 50, 140];
const QVAL     = [15, 30, 80, 210];
const PAL_BGRA = [0x00,0x00,0x00,0x00, 0x55,0x55,0x55,0x00,
                  0xAA,0xAA,0xAA,0x00, 0xFF,0xFF,0xFF,0x00];

function atkinsonDither(rgba, w, h) {
  const pad = 4, off = pad, aw = w + pad * 2;
  let e0 = new Float32Array(aw), e1 = new Float32Array(aw), e2 = new Float32Array(aw);
  const idx = new Uint8Array(w * h);
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const p = (y * w + x) * 4;
      const g = 0.299 * rgba[p] + 0.587 * rgba[p+1] + 0.114 * rgba[p+2];
      const a = Math.min(255, Math.max(0, g + e0[x + off]));
      let q, qv;
      if      (a < THRESH[0]) { q = 0; qv = QVAL[0]; }
      else if (a < THRESH[1]) { q = 1; qv = QVAL[1]; }
      else if (a < THRESH[2]) { q = 2; qv = QVAL[2]; }
      else                    { q = 3; qv = QVAL[3]; }
      idx[y * w + x] = q;
      const e = (a - qv) / 8;
      e0[x+off+1] += e; e0[x+off+2] += e;
      e1[x+off-1] += e; e1[x+off]   += e; e1[x+off+1] += e;
      e2[x+off]   += e;
    }
    [e0, e1, e2] = [e1, e2, new Float32Array(aw)];
  }
  return idx;
}

function make2BitBMP(idx, w, h) {
  const bpr = Math.floor((w * 2 + 31) / 32) * 4;
  const iSz = bpr * h;
  const hSz = 14 + 40 + 16;
  const fSz = hSz + iSz;
  const buf = new ArrayBuffer(fSz);
  const dv  = new DataView(buf);
  const u8  = new Uint8Array(buf);
  u8[0] = 0x42; u8[1] = 0x4D;
  dv.setUint32(2,  fSz, true);
  dv.setUint32(10, hSz, true);
  dv.setUint32(14, 40,  true);
  dv.setInt32 (18, w,   true);
  dv.setInt32 (22, -h,  true); // top-down
  dv.setUint16(26, 1,   true);
  dv.setUint16(28, 2,   true);
  dv.setUint32(34, iSz, true);
  dv.setUint32(46, 4,   true);
  dv.setUint32(50, 4,   true);
  for (let i = 0; i < 4; i++) u8.set(PAL_BGRA.slice(i*4, i*4+4), 54 + i*4);
  for (let y = 0; y < h; y++) {
    const ro = hSz + y * bpr;
    for (let x = 0; x < w; x++) {
      u8[ro + Math.floor(x * 2 / 8)] |= (idx[y * w + x] << (6 - (x * 2) % 8));
    }
  }
  return buf;
}

function loadImageRGBA(data) {
  return new Promise((res, rej) => {
    const url = URL.createObjectURL(new Blob([data]));
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = img.width; c.height = img.height;
      c.getContext('2d').drawImage(img, 0, 0);
      URL.revokeObjectURL(url);
      res(c.getContext('2d').getImageData(0, 0, img.width, img.height));
    };
    img.onerror = e => { URL.revokeObjectURL(url); rej(e); };
    img.src = url;
  });
}

// ── EPUB PROCESSOR ────────────────────────────────────────────────────────
const IMG_MIME = ['image/jpeg','image/png','image/gif','image/webp'];

function findCoverId(opf) {
  return (opf.match(/<item\s[^>]*properties="[^"]*cover-image[^"]*"[^>]*id="([^"]+)"/)?.[1])
      || (opf.match(/<item\s[^>]*id="([^"]+)"[^>]*properties="[^"]*cover-image[^"]*"/)?.[1])
      || (opf.match(/<meta\s[^>]*name="cover"[^>]*content="([^"]+)"/)?.[1])
      || (opf.match(/<meta\s[^>]*content="([^"]+)"[^>]*name="cover"/)?.[1])
      || null;
}

function findHrefById(opf, id) {
  const safe = id.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&');
  return opf.match(new RegExp('<item\\s[^>]*id="' + safe + '"[^>]*href="([^"]+)"'))?.[1] || null;
}

async function processEpub(epubBuf, onProg) {
  const zip = await JSZip.loadAsync(epubBuf);
  const containerXml = await zip.file('META-INF/container.xml').async('string');
  const opfPath = containerXml.match(/full-path="([^"]+\.opf)"/)?.[1];
  if (!opfPath) throw new Error('OPF не найден');

  let opf = await zip.file(opfPath).async('string');
  const opfDir = opfPath.includes('/') ? opfPath.slice(0, opfPath.lastIndexOf('/') + 1) : '';

  // Метаданные и имя файла
  const meta = parseEpubMeta(opf);
  const outName = buildFilename(meta);
  log('📖 ' + (meta.author || '?') + ' — ' + (meta.title || '?'));
  if (meta.series) log('📚 Серия: ' + meta.series + (meta.seriesIdx ? ' #' + formatSeriesIdx(meta.seriesIdx) : ''));
  log('💾 Имя файла: ' + outName);

  // Обложка
  const coverId   = findCoverId(opf);
  const coverHref = coverId ? findHrefById(opf, coverId) : null;

  const seen = new Set();
  const imgs = [];
  if (coverHref) { imgs.push({ hr: coverHref }); seen.add(coverHref); }

  const rx = /<item\s[^>]*>/g;
  let m;
  while ((m = rx.exec(opf)) !== null) {
    const tag = m[0];
    const mt  = tag.match(/media-type="([^"]+)"/)?.[1];
    const hr  = tag.match(/href="([^"]+)"/)?.[1];
    if (mt && hr && IMG_MIME.includes(mt) && !seen.has(hr)) { imgs.push({ hr, mt }); seen.add(hr); }
  }
  log('🖼 Изображений: ' + imgs.length);

  let done = 0, previewShown = false;
  for (const img of imgs) {
    const fullPath = opfDir + img.hr;
    const f = zip.file(fullPath);
    if (!f) { log('⚠ Не найден: ' + fullPath, 'w'); continue; }
    let imgData;
    try { imgData = await loadImageRGBA(await f.async('arraybuffer')); }
    catch (e) { log('⚠ Пропуск ' + img.hr + ': ' + e.message, 'w'); continue; }

    const idx = atkinsonDither(imgData.data, imgData.width, imgData.height);
    const bmp = make2BitBMP(idx, imgData.width, imgData.height);

    const dotPos  = img.hr.lastIndexOf('.');
    const newHr   = img.hr.slice(0, dotPos) + '.bmp';
    const newFull = opfDir + newHr;
    const oldBase = img.hr.slice(img.hr.lastIndexOf('/') + 1);
    const newBase = newHr.slice(newHr.lastIndexOf('/') + 1);

    zip.remove(fullPath);
    zip.file(newFull, bmp);
    opf = opf.split(img.hr).join(newHr);
    if (img.mt) opf = opf.split(img.mt).join('image/bmp');

    for (const name of Object.keys(zip.files)) {
      if (!/\.(html|xhtml|htm)$/i.test(name)) continue;
      const html = await zip.file(name).async('string');
      if (html.includes(oldBase)) zip.file(name, html.split(oldBase).join(newBase));
    }

    if (!previewShown) { showPreview(idx, imgData.width, imgData.height); previewShown = true; }
    done++; onProg(done, imgs.length);
  }

  zip.file(opfPath, opf);
  return { buf: await zip.generateAsync({ type: 'arraybuffer', compression: 'DEFLATE' }),
           name: outName, meta };
}

function showPreview(idx, w, h) {
  const cnv = $('preview');
  const scale = Math.min(1, 300 / w);
  cnv.width  = Math.round(w * scale);
  cnv.height = Math.round(h * scale);
  cnv.style.display = 'block';
  const tmp = document.createElement('canvas');
  tmp.width = w; tmp.height = h;
  const id  = tmp.getContext('2d').createImageData(w, h);
  const C   = [[0,0,0],[85,85,85],[170,170,170],[255,255,255]];
  for (let i = 0; i < idx.length; i++) {
    const c = C[idx[i]];
    id.data[i*4]=c[0]; id.data[i*4+1]=c[1]; id.data[i*4+2]=c[2]; id.data[i*4+3]=255;
  }
  tmp.getContext('2d').putImageData(id, 0, 0);
  cnv.getContext('2d').drawImage(tmp, 0, 0, cnv.width, cnv.height);
}

// ── UI ────────────────────────────────────────────────────────────────────
let procBuf = null, procName = '';

async function peekMeta(file) {
  try {
    const zip = await JSZip.loadAsync(await file.arrayBuffer());
    const c   = await zip.file('META-INF/container.xml').async('string');
    const op  = c.match(/full-path="([^"]+\.opf)"/)?.[1];
    if (!op) return;
    const opf = await zip.file(op).async('string');
    const meta = parseEpubMeta(opf);
    const fname = buildFilename(meta);
    const parts = [];
    if (meta.author) parts.push('<b>Автор:</b> <span>' + esc(meta.author) + '</span>');
    if (meta.title)  parts.push('<b>Название:</b> <span>' + esc(meta.title) + '</span>');
    if (meta.series) {
      const idx = formatSeriesIdx(meta.seriesIdx);
      parts.push('<b>Серия:</b> <span>' + esc(meta.series) + (idx ? ' #' + idx : '') + '</span>');
    }
    $('metaBox').innerHTML = parts.join('<br>');
    $('metaBox').style.display = parts.length ? 'block' : 'none';
    $('fnameBox').textContent = '→ ' + fname;
    $('fnameBox').style.display = 'block';
  } catch(e) {}
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

$('fileConv').onchange = async e => {
  const f = e.target.files[0]; if (!f) return;
  $('bfc').textContent = '📄 ' + f.name;
  $('bfc').classList.add('ok');
  $('bConv').disabled = false;
  $('bDl').disabled = true; $('bSendConv').disabled = true;
  $('preview').style.display = 'none';
  $('metaBox').style.display = 'none'; $('fnameBox').style.display = 'none';
  procBuf = null;
  await peekMeta(f);
};

$('bConv').onclick = async () => {
  const f = $('fileConv').files[0]; if (!f) return;
  $('bConv').disabled = true;
  $('cp').style.width = '0%'; $('cl').textContent = '';
  $('preview').style.display = 'none';
  log('▶ Конвертирую: ' + f.name);
  try {
    const raw = await f.arrayBuffer();
    const result = await processEpub(raw, (done, total) => {
      const pct = Math.round(done / total * 100);
      $('cp').style.width = pct + '%';
      $('cl').textContent = done + ' / ' + total + ' изображений (' + pct + '%)';
    });
    procBuf  = result.buf;
    procName = result.name;
    log('✅ Готово: ' + procName);
    $('fnameBox').textContent = '→ ' + procName;
    $('bDl').disabled = false;
    if (bleConnected) $('bSendConv').disabled = false;
  } catch (e) {
    log('❌ ' + e.message, 'e');
  } finally {
    $('bConv').disabled = false;
  }
};

$('bDl').onclick = () => {
  if (!procBuf) return;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([procBuf], { type: 'application/epub+zip' }));
  a.download = procName; a.click();
};

// ── BLE ───────────────────────────────────────────────────────────────────
const SVC  = '19b10000-e8f2-537e-4f6c-d104768a1214';
const META_C = '19b10001-e8f2-537e-4f6c-d104768a1214';
const DATA_C = '19b10002-e8f2-537e-4f6c-d104768a1214';
const STAT_C = '19b10003-e8f2-537e-4f6c-d104768a1214';

let bleDevice = null, bleServer = null;
let metaChar = null, dataChar = null, statChar = null;
let bleConnected = false, mtu = 20, ackInterval = 4096;
let stateResolvers = {}, lastStatus = null;

function setConnState(on) {
  bleConnected = on;
  $('dot').className = 'dot' + (on ? ' on' : '');
  $('bst').textContent = on ? ((bleDevice && bleDevice.name) || 'SUMI') : 'Не подключено';
  $('bConn').disabled = on; $('bDisc').disabled = !on;
  if (on && procBuf) $('bSendConv').disabled = false;
  if (!on) { $('bSendConv').disabled = true; $('bSendFile').disabled = true; }
  if (on && $('fileSend').files[0]) $('bSendFile').disabled = false;
}

function onStatusNotify(event) {
  let s; try { s = JSON.parse(dec.decode(event.target.value)); } catch { return; }
  log('← ' + JSON.stringify(s), s.state === 'error' ? 'e' : '');
  lastStatus = s;
  const fn = stateResolvers[s.state];
  if (fn) { delete stateResolvers[s.state]; fn(s); }
  if (s.state === 'error' || s.state === 'cancelled') {
    const err = new Error(s.msg || s.state);
    Object.values(stateResolvers).forEach(f => f({ _err: err }));
    stateResolvers = {};
  }
}

function waitForState(state, ms = 15000) {
  return new Promise((res, rej) => {
    if (lastStatus && lastStatus.state === state) { const s = lastStatus; lastStatus = null; return res(s); }
    const t = setTimeout(() => { delete stateResolvers[state]; rej(new Error('Timeout: ' + state)); }, ms);
    stateResolvers[state] = s => { clearTimeout(t); s._err ? rej(s._err) : res(s); };
  });
}

$('bConn').onclick = async () => {
  $('bConn').disabled = true;
  try {
    log('🔍 Сканирую...');
    bleDevice = await navigator.bluetooth.requestDevice({
      filters: [{ namePrefix: 'SUMI' }], optionalServices: [SVC]
    });
    bleDevice.addEventListener('gattserverdisconnected', () => {
      setConnState(false); log('⚠ Устройство отключилось', 'w');
    });
    bleServer = await bleDevice.gatt.connect();
    const svc = await bleServer.getPrimaryService(SVC);
    metaChar = await svc.getCharacteristic(META_C);
    dataChar = await svc.getCharacteristic(DATA_C);
    statChar = await svc.getCharacteristic(STAT_C);
    await statChar.startNotifications();
    statChar.addEventListener('characteristicvaluechanged', onStatusNotify);
    setConnState(true);
    log('✅ Подключено: ' + bleDevice.name);
  } catch (e) {
    log('❌ ' + e.message, 'e'); $('bConn').disabled = false;
  }
};

$('bDisc').onclick = () => { if (bleDevice && bleDevice.gatt.connected) bleDevice.gatt.disconnect(); };

$('fileSend').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  $('bfs').textContent = '📄 ' + f.name; $('bfs').classList.add('ok');
  if (bleConnected) $('bSendFile').disabled = false;
};

async function doSend(buf, name) {
  if (!bleConnected) { log('❌ Нет подключения!', 'e'); return; }
  const folder = $('folder').value.trim() || 'books';
  let safe = name.replace(/[\\/*?:"<>|]/g, '_');
  if (safe.length > 48) {
    const ext = safe.lastIndexOf('.') > 0 ? safe.slice(safe.lastIndexOf('.')) : '';
    safe = safe.slice(0, 44 - ext.length) + ext;
  }
  lastStatus = null; stateResolvers = {};
  $('sp').style.width = '0%'; $('sl').textContent = '';
  await sleep(500);

  const meta = JSON.stringify({ name: safe, size: buf.byteLength, folder });
  log('→ META: ' + meta);
  await metaChar.writeValueWithResponse(enc.encode(meta));

  const ready = await waitForState('ready', 12000);
  if (ready.mtu) mtu = ready.mtu;
  if (ready.ack) ackInterval = ready.ack;
  log('✅ Ready — MTU:' + mtu + ' ACK:' + ackInterval);

  let sent = 0, sinceAck = 0, ci = 0;
  while (sent < buf.byteLength) {
    const chunk = buf.slice(sent, sent + mtu);
    if (ci % 8 === 0) { await dataChar.writeValueWithResponse(chunk); await sleep(1); }
    else              { await dataChar.writeValueWithoutResponse(chunk); await sleep(5); }
    sent += chunk.byteLength; sinceAck += chunk.byteLength; ci++;
    const pct = (sent / buf.byteLength * 100).toFixed(1);
    $('sp').style.width = pct + '%';
    $('sl').textContent = (sent/1024).toFixed(1) + ' / ' + (buf.byteLength/1024).toFixed(1) + ' KB (' + pct + '%)';
    if (sinceAck >= ackInterval) { log('⏳ Жду ACK...'); await waitForState('ack', 15000); sinceAck = 0; }
  }
  log('→ Completion signal...');
  await sleep(300);
  await dataChar.writeValueWithResponse(new ArrayBuffer(0));
  const done = await waitForState('done', 20000);
  log('🎉 Готово! ' + JSON.stringify(done));
  $('sp').style.width = '100%';
}

$('bSendConv').onclick = async () => {
  if (!procBuf) return; $('bSendConv').disabled = true;
  try { await doSend(procBuf, procName); }
  catch (e) { log('❌ ' + e.message, 'e'); }
  finally { $('bSendConv').disabled = false; }
};
$('bSendFile').onclick = async () => {
  const f = $('fileSend').files[0]; if (!f) return; $('bSendFile').disabled = true;
  try { await doSend(await f.arrayBuffer(), f.name); }
  catch (e) { log('❌ ' + e.message, 'e'); }
  finally { $('bSendFile').disabled = false; }
};
</script>
